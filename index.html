<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🌈 Aventura del ciclo del agua 💧</title>

    <style>

        body {

            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #87ceeb, #dff8ff);
            margin: 0;
            padding: 20px;

        }

        h1 {

            color: #0b5394;
            font-size: 42px;
            text-shadow: 2px 2px 8px white;

        }

        .instrucciones {

            font-size: 22px;
            background: white;
            width: 80%;
            max-width: 900px;
            margin: auto;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 0 15px gray;

        }

        .contenedor {

            position: relative;
            width: 95%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            margin: 30px auto;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 25px black;

        }

        .contenedor img {

            width: 100%;
            height: 100%;
            object-fit: contain;

        }

        .zona {

            position: absolute;
            width: 18%;
            min-width: 120px;
            height: 60px;
            border: 4px dashed white;
            border-radius: 15px;
            background: rgba(255,255,255,0.85);
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        /* Posiciones */

        #evaporacionZona {

            left: 6%;
            top: 48%;

        }

        #condensacionZona {

            left: 40%;
            top: 8%;

        }

        #precipitacionZona {

            right: 8%;
            top: 20%;

        }

        #infiltracionZona {

            right: 18%;
            bottom: 5%;

        }

        .palabras {

            margin-top: 25px;

        }

        .palabra {

            display: inline-block;
            margin: 10px;
            padding: 15px 25px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 15px;
            cursor: grab;
            transition: 0.3s;

        }

        .palabra:hover {

            transform: scale(1.1);

        }

        #evaporacion {

            background: #ff9800;

        }

        #condensacion {

            background: #03a9f4;

        }

        #precipitacion {

            background: #7e57c2;

        }

        #infiltracion {

            background: #4caf50;

        }

        button {

            margin-top: 20px;
            margin-left: 10px;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            color: white;
            cursor: pointer;
            transition: 0.3s;

        }

        button:hover {

            transform: scale(1.05);

        }

        #comprobar {

            background: #ff4081;

        }

        #reiniciar {

            background: #00b894;

        }

        #mensaje {

            font-size: 28px;
            font-weight: bold;
            margin-top: 25px;

        }

        .estrellas {

            font-size: 40px;
            animation: saltar 1s infinite;

        }

        @keyframes saltar {

            0% {

                transform: translateY(0);

            }

            50% {

                transform: translateY(-10px);

            }

            100% {

                transform: translateY(0);

            }

        }

    </style>

</head>

<body>

    <h1>🌈💧 ¡Aventura del ciclo del agua! ☁️🌞</h1>

    <div class="instrucciones">

       Analiza la imagen y arrastra cada palabra al lugar correcto y pulsa Comprobar.

    </div>

    <div class="contenedor">

        <img src="ciclo.jpg" alt="Ciclo del agua">

        <div class="zona" id="evaporacionZona" data-correcta="Evaporación"></div>

        <div class="zona" id="condensacionZona" data-correcta="Condensación"></div>

        <div class="zona" id="precipitacionZona" data-correcta="Precipitación"></div>

        <div class="zona" id="infiltracionZona" data-correcta="Infiltración"></div>

    </div>

    <div class="palabras">

        <div class="palabra" id="evaporacion" draggable="true">

            ☀️ Evaporación

        </div>

        <div class="palabra" id="condensacion" draggable="true">

            ☁️ Condensación

        </div>

        <div class="palabra" id="precipitacion" draggable="true">

            🌧️ Precipitación

        </div>

        <div class="palabra" id="infiltracion" draggable="true">

            🌱 Infiltración

        </div>

    </div>

    <button id="comprobar" onclick="verificar()">

        ⭐ Comprobar

    </button>

    <button id="reiniciar" onclick="reiniciar()">

        🔄 Jugar otra vez

    </button>

    <div id="mensaje"></div>

    <script>

        const palabras = document.querySelectorAll(".palabra");
        const zonas = document.querySelectorAll(".zona");

        palabras.forEach(palabra => {

            palabra.addEventListener("dragstart", function(e) {

                e.dataTransfer.setData("texto", this.innerText);

            });

        });

        zonas.forEach(zona => {

            zona.addEventListener("dragover", function(e) {

                e.preventDefault();

            });

            zona.addEventListener("drop", function(e) {

                e.preventDefault();

                let texto = e.dataTransfer.getData("texto");

                this.innerHTML = texto;

                if (texto.includes("Evaporación")) {

                    this.dataset.respuesta = "Evaporación";

                }

                if (texto.includes("Condensación")) {

                    this.dataset.respuesta = "Condensación";

                }

                if (texto.includes("Precipitación")) {

                    this.dataset.respuesta = "Precipitación";

                }

                if (texto.includes("Infiltración")) {

                    this.dataset.respuesta = "Infiltración";

                }

            });

        });

        function verificar() {

            let puntos = 0;

            zonas.forEach(zona => {

                if (zona.dataset.respuesta === zona.dataset.correcta) {

                    puntos++;

                }

            });

            const mensaje = document.getElementById("mensaje");

            if (puntos === 4) {

                mensaje.innerHTML = `

                <div class="estrellas">

                    🎉 ⭐ 🏆 ⭐ 🎉

                </div>

                ¡Excelente! ¡Completaste el ciclo del agua! 🌎💧

                `;

                mensaje.style.color = "green";

            }

            else {

                mensaje.innerHTML =

                    "⭐ Obtuviste " + puntos +

                    " de 4 puntos. ¡Sigue intentando! 💪";

                mensaje.style.color = "#d63031";

            }

        }

        function reiniciar() {

            zonas.forEach(zona => {

                zona.innerHTML = "";

                zona.dataset.respuesta = "";

            });

            document.getElementById("mensaje").innerHTML = "";

        }

    </script>

</body>

</html>
